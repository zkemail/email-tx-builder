apiVersion: batch/v1
kind: Job
metadata:
  name: circuits-job
  labels:
    app: circuits-test
spec:
  ttlSecondsAfterFinished: 60  # Delete automatically 1 minute after completion
  backoffLimit: 0  # No retries if the job fails
  template:
    metadata:
      labels:
        app: circuits-test
    spec:
      nodeSelector:
        cloud.google.com/machine-family: c3
      containers:
        - name: circuits-runner
          image: wshino/circuits-runner:test5
          imagePullPolicy: Always  # Always pull the latest image
          env:
            - name: REPO_URL
              value: "${REPO_URL}"
            - name: COMMIT_HASH
              value: "${COMMIT_HASH}"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "64Gi"
      restartPolicy: Never