apiVersion: batch/v1
kind: Job
metadata:
  name: circuits-job
spec:
  ttlSecondsAfterFinished: 60  # Delete automatically 1 minute after completion
  template:
    spec:
      # Add tolerations for GPU nodes since they have more memory
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
        - name: circuits-runner
          image: wshino/circuits-runner:test5
          imagePullPolicy: Always  # Always pull the latest image
          env:
            - name: REPO_URL
              value: "${REPO_URL}"
            - name: COMMIT_HASH
              value: "${COMMIT_HASH}"
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"  # Increase initial request to match actual usage
            limits:
              cpu: "16"
              memory: "64Gi"
          # Add memory optimization settings
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=32768"  # Limit Node.js memory to 32GB
            - name: MALLOC_ARENA_MAX
              value: "2"  # Limit number of memory arenas to reduce fragmentation
          # Add resource monitoring
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "while true; do ps aux; free -h; sleep 30; done &"]
      restartPolicy: Never