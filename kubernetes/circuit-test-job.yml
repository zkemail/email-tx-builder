apiVersion: batch/v1
kind: Job
metadata:
  name: circuits-job
spec:
  ttlSecondsAfterFinished: 60  # Delete automatically 1 minute after completion
  template:
    spec:
      nodeSelector:
        cloud.google.com/machine-family: c3
      tolerations:
        - key: "cloud.google.com/machine-family"
          operator: "Equal"
          value: "c3"
          effect: "NoSchedule"
        - key: "cloud.google.com/pods-per-node"
          operator: "Equal"
          value: "any"
          effect: "NoSchedule"
      containers:
        - name: circuits-runner
          image: wshino/circuits-runner:test5
          imagePullPolicy: Always  # Always pull the latest image
          env:
            - name: REPO_URL
              value: "${REPO_URL}"
            - name: COMMIT_HASH
              value: "${COMMIT_HASH}"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "64Gi"
      restartPolicy: Never