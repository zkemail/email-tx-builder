name: Unit Tests

on: [push]

jobs:
  circuits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
            
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: '>= 363.0.0'

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin -q

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials ${{ secrets.YOUR_CLUSTER_NAME }} --region ${{ secrets.YOUR_REGION }}

      - name: Prepare and Deploy Circuits Job to GKE
        env:
          REPO_URL: "https://github.com/${{ github.repository }}"
          COMMIT_HASH: "${{ github.sha }}"
        run: |
          # Prepare the job file with substituted environment variables
          envsubst < kubernetes/circuit-test-job.yml > kubernetes/circuit-test-job-processed.yml
          
          # Output the processed job file for verification
          cat kubernetes/circuit-test-job-processed.yml
          
          # Delete the old job if it exists
          kubectl delete job circuits-job --ignore-not-found=true
          
          # Apply the job to GKE
          kubectl apply -f kubernetes/circuit-test-job-processed.yml

      - name: Follow Job Logs in Real-time
        run: |
          echo "Waiting for circuits-job pod to start..."
          
          # Wait for pod to be created and reach Running state
          POD_NAME=""
          TIMEOUT=300  # 5 minutes timeout
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # First check if pod exists in any state
            POD_NAME=$(kubectl get pods -l job-name=circuits-job -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            
            if [ -n "$POD_NAME" ]; then
              # Pod exists, check its status
              POD_STATUS=$(kubectl get pod $POD_NAME -o jsonpath='{.status.phase}' 2>/dev/null || true)
              echo "Pod $POD_NAME status: $POD_STATUS"
              
              if [ "$POD_STATUS" = "Pending" ]; then
                # Show detailed scheduling information
                echo "\nPod scheduling status:"
                kubectl describe pod $POD_NAME | grep -A 5 "Events:"
                
                echo "\nAvailable nodes matching selector (cloud.google.com/machine-family=c3):"
                kubectl get nodes -l cloud.google.com/machine-family=c3 -o custom-columns=NAME:.metadata.name,CPU:.status.capacity.cpu,MEMORY:.status.capacity.memory
                
                echo "\nNode resource usage:"
                kubectl describe nodes | grep -A 5 "Allocated resources"
                
                # Check if there are any scheduling errors
                SCHEDULE_ERR=$(kubectl get pod $POD_NAME -o jsonpath='{.status.conditions[?(@.type=="PodScheduled")].message}' 2>/dev/null || true)
                if [ -n "$SCHEDULE_ERR" ]; then
                  echo "\nScheduling error: $SCHEDULE_ERR"
                fi
              elif [ "$POD_STATUS" = "Running" ]; then
                break
              elif [ "$POD_STATUS" = "Failed" ]; then
                echo "Pod failed to start"
                kubectl describe pod $POD_NAME
                exit 1
              fi
            else
              echo "Waiting for pod to be created..."
            fi
            
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timeout waiting for pod to start"
            echo "Final pod status and events:"
            kubectl describe pod $POD_NAME
            exit 1
          fi
          
          echo "Pod $POD_NAME is running. Following logs..."
          
          # Follow logs until job completes or fails
          kubectl logs -f $POD_NAME &
          LOGS_PID=$!
          
          # Wait for job completion
          while true; do
            STATUS=$(kubectl get job circuits-job -o jsonpath='{.status.conditions[?(@.type=="Complete" || @.type=="Failed")].type}' 2>/dev/null || true)
            if [ "$STATUS" = "Complete" ]; then
              echo "Job completed successfully!"
              kill $LOGS_PID 2>/dev/null || true
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Job failed!"
              kubectl describe pod $POD_NAME
              kill $LOGS_PID 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done

      - name: Check Job Status
        run: |
          # Check if the job was successful
          JOB_SUCCEEDED=$(kubectl get job circuits-job -o jsonpath='{.status.succeeded}')
          if [ "$JOB_SUCCEEDED" != "1" ]; then
            echo "Job failed!"
            exit 1
          fi
          echo "Job completed successfully!"

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
        with:
          version: nightly-0079a1146b79a4aeda58b0258215bedb1f92700b

      - name: Run tests
        working-directory: packages/contracts
        run: yarn test

  relayer:
    name: relayer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
        with:
          version: nightly-0079a1146b79a4aeda58b0258215bedb1f92700b

      - name: Build contracts
        working-directory: packages/contracts
        run: yarn build

      - name: Run tests
        working-directory: packages/relayer
        run: cargo test