name: Unit Tests

on: [push]

jobs:
  circuits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
            
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: '>= 363.0.0'

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin -q

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials ${{ secrets.YOUR_CLUSTER_NAME }} --region ${{ secrets.YOUR_REGION }}

      - name: Prepare and Deploy Circuits Job to GKE
        env:
          REPO_URL: "https://github.com/${{ github.repository }}"
          COMMIT_HASH: "${{ github.sha }}"
        run: |
          # Prepare the job file with substituted environment variables
          envsubst < kubernetes/circuit-test-job.yml > kubernetes/circuit-test-job-processed.yml
          
          # Output the processed job file for verification
          cat kubernetes/circuit-test-job-processed.yml
          
          # Delete the old job if it exists
          kubectl delete job circuits-job --ignore-not-found=true
          
          # Apply the job to GKE
          kubectl apply -f kubernetes/circuit-test-job-processed.yml

      - name: Follow Job Logs in Real-time
        run: |
          echo "Waiting for circuits-job pod to start..."
          
          # Wait for pod to be ready and follow logs
          POD_NAME=""
          while [ -z "$POD_NAME" ]; do
            POD_NAME=$(kubectl get pods -l job-name=circuits-job --field-selector status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            sleep 2
          done
          
          echo "Pod $POD_NAME is running. Following logs..."
          
          # Follow logs until job completes or fails
          kubectl logs -f $POD_NAME &
          LOGS_PID=$!
          
          # Wait for job completion
          while true; do
            STATUS=$(kubectl get job circuits-job -o jsonpath='{.status.conditions[0].type}' 2>/dev/null)
            if [ "$STATUS" = "Complete" ]; then
              echo "Job completed successfully!"
              kill $LOGS_PID 2>/dev/null
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Job failed!"
              kill $LOGS_PID 2>/dev/null
              exit 1
            fi
            sleep 5
          done

      - name: Check Job Status
        run: |
          # Check if the job was successful
          JOB_SUCCEEDED=$(kubectl get job circuits-job -o jsonpath='{.status.succeeded}')
          if [ "$JOB_SUCCEEDED" != "1" ]; then
            echo "Job failed!"
            exit 1
          fi
          echo "Job completed successfully!"

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
        with:
          version: nightly-0079a1146b79a4aeda58b0258215bedb1f92700b

      - name: Run tests
        working-directory: packages/contracts
        run: yarn test

  relayer:
    name: relayer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
        with:
          version: nightly-0079a1146b79a4aeda58b0258215bedb1f92700b

      - name: Build contracts
        working-directory: packages/contracts
        run: yarn build

      - name: Run tests
        working-directory: packages/relayer
        run: cargo test